name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format and clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust
        run: rustup default stable

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust
        run: rustup default stable

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.94
        run: rustup toolchain install 1.94.0 --profile minimal

      - name: Use Rust 1.94
        run: rustup default 1.94.0

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Test workspace
        run: cargo test --workspace --locked
